stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - src/utils.py
      - data/raw/Telco-Customer-Churn.csv
    outs:
      - data/raw/validated_telco_churn.csv

  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - src/utils.py
      - data/raw/validated_telco_churn.csv
    outs:
      - data/interim/preprocessed_telco_churn.csv

  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - src/utils.py
      - data/interim/preprocessed_telco_churn.csv
    outs:
      - data/processed/telco_churn_processed.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - src/utils.py
      - data/processed/telco_churn_processed.csv
    params:
      - configs/config.yaml:
          - train.test_size
          - train.random_state
          - train.threshold
          - model.best_params
    outs:
      - models/xgboost_churn_model.pkl
      - models/feature_columns.json

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - src/utils.py
      - data/processed/telco_churn_processed.csv
      - models/xgboost_churn_model.pkl
    metrics:
      - logs/evaluation_report.json:
          cache: false
    outs:
      - logs/confusion_matrix.png:
          cache: false