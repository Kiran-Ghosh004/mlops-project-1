data:
  raw_path: "data/raw/Telco-Customer-Churn.csv"
  ingested_path: "data/raw/validated_telco_churn.csv"
  processed_path: "data/processed/telco_churn_processed.csv"
  target_column: "Churn"
  required_columns:
    - customerID
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - tenure
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
    - MonthlyCharges
    - TotalCharges
    - Churn

train:
  test_size: 0.2
  random_state: 42
  threshold: 0.3

model:
  best_params:
    n_estimators: 522
    learning_rate: 0.16263699141029567
    max_depth: 5
    subsample: 0.8997157589319335
    colsample_bytree: 0.5038303325931903
    min_child_weight: 8
    gamma: 3.820045243367761
    reg_alpha: 2.3861928586250136
    reg_lambda: 4.440032624822587
    random_state: 42
    n_jobs: -1
    eval_metric: "logloss"

paths:
  model_dir: "models/"
  log_dir: "logs/"